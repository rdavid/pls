---
name: actionlint
'on':
  pull_request:
  push:
    branches: [master]
permissions:
  contents: read
  pull-requests: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  actionlint:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: reviewdog/action-actionlint@v1.72.0
        with:
          reporter: github-pr-review  # Default is github-pr-check
          fail_level: error
