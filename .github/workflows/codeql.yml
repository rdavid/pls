---
name: codeql
'on':
  pull_request:
    paths: &paths
      - 'bin/**'
      - 'lib/**'
      - 'test/**'
      - 'Gemfile'
      - 'Gemfile.lock'
      - 'Rakefile'
      - 'pls.gemspec'
      - '.github/workflows/codeql.yml'
  push:
    branches: [master]
    paths: *paths
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:
permissions:
  contents: read
  security-events: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  codeql:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@v4.37.0
        with:
          languages: ruby
          build-mode: none
      - uses: github/codeql-action/analyze@v4.37.0
        with:
          category: /language:ruby
